<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <!-- Connecting lines from conductor to ensemble members -->
  <g stroke="#a5b4fc" stroke-width="1.5" opacity="0.5">
    <line x1="100" y1="88" x2="42"  y2="56"/>
    <line x1="100" y1="88" x2="68"  y2="38"/>
    <line x1="100" y1="88" x2="100" y2="30"/>
    <line x1="100" y1="88" x2="132" y2="38"/>
    <line x1="100" y1="88" x2="158" y2="56"/>
  </g>

  <!-- Connecting lines between ensemble members (subtle mesh) -->
  <g stroke="#c7d2fe" stroke-width="1" opacity="0.3">
    <line x1="42"  y1="56" x2="68"  y2="38"/>
    <line x1="68"  y1="38" x2="100" y2="30"/>
    <line x1="100" y1="30" x2="132" y2="38"/>
    <line x1="132" y1="38" x2="158" y2="56"/>
  </g>

  <!-- Ensemble arc: five agent nodes arranged in a semicircle -->
  <circle cx="42"  cy="56" r="10" fill="#818cf8"/>
  <circle cx="68"  cy="38" r="10" fill="#818cf8"/>
  <circle cx="100" cy="30" r="10" fill="#818cf8"/>
  <circle cx="132" cy="38" r="10" fill="#818cf8"/>
  <circle cx="158" cy="56" r="10" fill="#818cf8"/>

  <!-- Conductor node (larger, gradient) -->
  <circle cx="100" cy="88" r="16" fill="url(#glow)"/>

  <!-- Baton arc sweeping beneath the conductor -->
  <path d="M 56 130 Q 100 108 144 130" fill="none" stroke="#6366f1" stroke-width="3" stroke-linecap="round"/>

  <!-- Small accent dots at baton endpoints -->
  <circle cx="56"  cy="130" r="4" fill="#a5b4fc"/>
  <circle cx="144" cy="130" r="4" fill="#a5b4fc"/>

  <!-- Subtle emanating waves below the baton (orchestration in motion) -->
  <path d="M 68 150 Q 100 140 132 150" fill="none" stroke="#c7d2fe" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <path d="M 76 162 Q 100 154 124 162" fill="none" stroke="#c7d2fe" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
</svg>
