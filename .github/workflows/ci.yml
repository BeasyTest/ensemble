name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y jq tmux

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install jq tmux || true

      - name: Run unit tests
        run: |
          bash tests/test-spawn.sh
          bash tests/test-parse-phase.sh
          bash tests/test-monitor.sh
          bash tests/test-send-message.sh
